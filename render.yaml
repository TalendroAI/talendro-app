services:
  - type: web
    name: talendro-app
    env: node
    plan: starter
    region: oregon
    buildCommand: npm run install:all && npm run build && cd server && npx playwright install chromium --with-deps
    startCommand: cd server && npm start
    envVars:
      # ── Core ─────────────────────────────────────────────────────────────────
      - key: NODE_ENV
        value: production
      - key: PORT
        sync: false
      - key: FRONTEND_URL
        value: https://talendro.com
      - key: DOMAIN
        value: talendro.com

      # ── Database ──────────────────────────────────────────────────────────────
      - key: MONGODB_URI
        sync: false

      # ── Auth ──────────────────────────────────────────────────────────────────
      - key: JWT_SECRET
        sync: false

      # ── AI Services ───────────────────────────────────────────────────────────
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: XAI_API_KEY
        sync: false

      # ── Stripe Billing ────────────────────────────────────────────────────────
      - key: STRIPE_SECRET_KEY
        sync: false
      # Price IDs — must match the env var names used in server/routes/stripe.js
      - key: STRIPE_PRICE_ID_STARTER_APPLY
        sync: false
      - key: STRIPE_PRICE_ID_PRO_APPLY
        sync: false
      - key: STRIPE_PRICE_ID_CONCIERGE_APPLY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false

      # ── Email (Resend) ────────────────────────────────────────────────────────
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: support@talendro.com

      # ── Job Sources: Free Direct ATS APIs (no key required) ──────────────────
      # Greenhouse, Lever, Ashby, and SmartRecruiters are all free public APIs.
      # No API keys needed — crawlers run automatically on startup.

      # ── Job Sources: USAJobs (Federal Government) ─────────────────────────────
      # Free API — register at https://developer.usajobs.gov/APIRequest/Index
      # USAJOBS_USER_AGENT must be your email address (required by USAJobs API)
      - key: USAJOBS_API_KEY
        sync: false
      - key: USAJOBS_USER_AGENT
        sync: false

      # ── Job Sources: RapidAPI (Fantastic.jobs + JSearch) ─────────────────────
      # Required for Fantastic.jobs (175,000+ career sites) and JSearch (Google for Jobs)
      - key: RAPIDAPI_KEY
        sync: false

      # ── Auto-Apply Engine ─────────────────────────────────────────────────────
      # Auto-apply engine is active — stealth browser + CAPTCHA solver + IQA service
      - key: ENABLE_AUTO_APPLY
        value: "true"
      - key: APPLY_WORKER_CONCURRENCY
        value: "2"
