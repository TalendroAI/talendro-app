services:
  - type: web
    name: talendro-app
    env: node
    plan: starter
    region: oregon
    buildCommand: npm run install:all && npm run build && cd server && npx playwright install chromium --with-deps
    startCommand: cd server && npm start
    envVars:
      # ── Core ────────────────────────────────────────────────────────────────
      - key: NODE_ENV
        value: production
      - key: PORT
        sync: false
      - key: FRONTEND_URL
        value: https://talendro.com
      - key: DOMAIN
        value: talendro.com

      # ── Database ─────────────────────────────────────────────────────────────
      - key: MONGODB_URI
        sync: false

      # ── Auth ─────────────────────────────────────────────────────────────────
      - key: JWT_SECRET
        sync: false

      # ── AI Services ──────────────────────────────────────────────────────────
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: XAI_API_KEY
        sync: false

      # ── Stripe Billing ───────────────────────────────────────────────────────
      - key: STRIPE_SECRET_KEY
        sync: false
      # Price IDs — must match the env var names used in server/routes/stripe.js
      - key: STRIPE_PRICE_ID_STARTER_APPLY
        sync: false
      - key: STRIPE_PRICE_ID_PRO_APPLY
        sync: false
      - key: STRIPE_PRICE_ID_CONCIERGE_APPLY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false

      # ── Email (Resend) ────────────────────────────────────────────────────────
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: support@talendro.com

      # ── Job Sources (RapidAPI) ────────────────────────────────────────────────
      # Required for Fantastic.jobs and JSearch ingestion (175K+ career sites)
      - key: RAPIDAPI_KEY
        sync: false

      # ── Auto-Apply Engine ────────────────────────────────────────────────────
      # Set to 'true' once the Playwright ATS adapters are implemented
      - key: ENABLE_AUTO_APPLY
        value: "false"
      - key: APPLY_WORKER_CONCURRENCY
        value: "2"
